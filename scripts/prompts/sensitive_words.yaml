# 硬禁用：出现即拦截，render 失败，要求重新生成
hard_block:
  # 收益保证类
  - 必涨
  - 必跌
  - 稳赚
  - 保本
  - 保收益
  - 无风险
  - 零风险
  - 包赚
  - 包赔
  - 不会亏
  # 直接交易建议类
  - 推荐买入
  - 推荐卖出
  - 建议买入
  - 建议卖出
  - 强烈买入
  - 强烈卖出
  - 强买
  - 强卖
  - 跟单
  - 老师带
  - 内幕
  - 内幕消息

# 软改写：自动替换为合规表达
soft_rewrite:
  目标价: 关注区间
  目标位: 关注区间
  止损位: 波动下沿
  止盈位: 波动上沿
  建议做多: 情绪偏多
  建议做空: 情绪偏空
  可以做多: 存在多头空间
  可以做空: 存在空头空间
  应该买入: 买盘占优
  应该卖出: 卖盘占优
  预期收益: 预期空间
  稳定收益: 潜在空间
  全仓: 高仓位
  重仓: 较高仓位
  梭哈: 高仓位
  抄底: 低位介入机会
  逃顶: 高位减持机会
